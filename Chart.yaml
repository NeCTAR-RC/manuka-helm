apiVersion: v2
name: manuka
description: A Helm chart for manuka
type: application
version: 4.0.3
appVersion: 3.1.1
sources:
- https://github.com/NeCTAR-RC/manuka-helm.git
dependencies:
- name: common
  repository: oci://registry-1.docker.io/bitnamicharts
  version: 2.41.0
- name: shibd
  repository: oci://registry.rc.nectar.org.au/nectar-helm
  version: 1.3.1
- name: mariadb
  version: 26.1.8
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: components.mariadb
- name: rabbitmq
  version: 16.0.14
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: components.rabbitmq
- name: memcached
  version: 8.6.9
  repository: oci://registry-1.docker.io/bitnamicharts
  condition: components.memcached
